<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp — Real-time Messaging</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .avatar-img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
        .sidebar-profile-link { cursor:pointer; transition: opacity 0.2s; }
        .sidebar-profile-link:hover { opacity: 0.8; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
    <div class="chat-app" id="chatApp">
        <!-- ==================== SIDEBAR ==================== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-header-left">
                    <div class="avatar sidebar-profile-link" id="myAvatar" onclick="window.location='/profile.html'" title="Edit profil"></div>
                    <span id="myDisplayName" style="font-weight:600;font-size:15px;" class="sidebar-profile-link" onclick="window.location='/profile.html'" title="Edit profil"></span>
                </div>
                <div class="sidebar-header-right">
                    <button onclick="window.location='/profile.html'" title="Profil" style="background:none;border:none;color:var(--wa-text-secondary);cursor:pointer;padding:8px;border-radius:50%;font-size:18px;">👤</button>
                    <button onclick="showNewChat()" title="Chat Baru" style="background:none;border:none;color:var(--wa-text-secondary);cursor:pointer;padding:8px;border-radius:50%;font-size:18px;">✏️</button>
                    <button onclick="logout()" class="btn-logout" title="Logout">⏻</button>
                </div>
            </div>

            <div class="sidebar-search">
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" placeholder="Cari pengguna..." id="searchInput" oninput="filterSidebar()">
                </div>
            </div>

            <div style="display:flex;border-bottom:1px solid var(--wa-border);">
                <button class="sidebar-tab active" id="tabChats" onclick="switchTab('chats')"
                    style="flex:1;padding:12px;background:none;border:none;color:var(--wa-green);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid var(--wa-green);font-family:inherit;">
                    💬 CHAT
                </button>
                <button class="sidebar-tab" id="tabUsers" onclick="switchTab('users')"
                    style="flex:1;padding:12px;background:none;border:none;color:var(--wa-text-secondary);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;">
                    👥 PENGGUNA
                </button>
            </div>

            <div class="chat-list" id="conversationList">
                <div class="chat-list-item active" id="publicChatItem" onclick="openPublicChat()">
                    <div class="avatar" style="background:linear-gradient(135deg,#00A884,#00D4AA);">💬</div>
                    <div class="chat-list-info">
                        <div class="chat-list-name">Public Chat Room</div>
                        <div class="chat-list-preview" id="publicLastMsg">Klik untuk mulai chat...</div>
                    </div>
                    <div class="chat-list-time" id="publicLastTime"></div>
                </div>
            </div>

            <div class="chat-list" id="usersList" style="display:none;"></div>
        </aside>

        <!-- ==================== CHAT AREA ==================== -->
        <main class="chat-main" id="chatMain">
            <div class="chat-header" id="chatHeader">
                <div class="avatar" id="chatAvatar" style="background:linear-gradient(135deg,#00A884,#00D4AA);">💬</div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chatName">Public Chat Room</div>
                    <div class="chat-header-status" id="chatStatus">Menghubungkan...</div>
                </div>
            </div>

            <div class="chat-messages" id="messageArea">
                <div class="date-divider">Hari Ini</div>
            </div>

            <div class="chat-input-area">
                <button title="Emoji">😊</button>
                <div class="chat-input-wrapper">
                    <input type="text" id="messageInput" placeholder="Ketik pesan"
                           onkeypress="if(event.key==='Enter')sendMessage()" autocomplete="off">
                </div>
                <button class="btn-send" onclick="sendMessage()" title="Kirim">➤</button>
            </div>
        </main>
    </div>

    <script>
        // ==================== Auth ====================
        const token = localStorage.getItem('token');
        const currentUsername = localStorage.getItem('username');
        const currentDisplayName = localStorage.getItem('displayName') || currentUsername;
        const currentAvatarColor = localStorage.getItem('avatarColor') || '#00A884';
        const currentProfilePhoto = localStorage.getItem('profilePhoto') || '';

        if (!token || !currentUsername) window.location.href = '/login.html';

        // ==================== State ====================
        let stompClient = null;
        let currentView = 'public';
        let currentRoomId = null;
        let currentRecipient = null;
        const onlineUsers = new Map();

        // ==================== Setup ====================
        function renderAvatar(el, color, username, photo) {
            if (photo) {
                el.innerHTML = '<img class="avatar-img" src="' + photo + '">';
                el.style.background = 'transparent';
            } else {
                el.textContent = username ? username.charAt(0).toUpperCase() : '?';
                el.style.background = color || '#00A884';
                el.style.overflow = 'hidden';
            }
        }

        renderAvatar(document.getElementById('myAvatar'), currentAvatarColor, currentUsername, currentProfilePhoto);
        document.getElementById('myDisplayName').textContent = currentDisplayName;

        // Check if profile photo exists in server
        (async function() {
            try {
                const res = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
                if (res.ok) {
                    const me = await res.json();
                    if (me.profilePhoto) {
                        localStorage.setItem('profilePhoto', me.profilePhoto);
                        renderAvatar(document.getElementById('myAvatar'), me.avatarColor, me.username, me.profilePhoto);
                    }
                }
            } catch(e) {}
        })();

        // ==================== WebSocket ====================
        function connect() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;
            stompClient.connect({ 'Authorization': 'Bearer ' + token }, onConnected, onError);
        }

        function onConnected() {
            document.getElementById('chatStatus').textContent = 'Online';
            stompClient.subscribe('/topic/public', onPublicMessage);
            stompClient.subscribe('/user/' + currentUsername + '/queue/private', onPrivateMessage);
            stompClient.send('/app/chat.addUser', {}, JSON.stringify({ sender: currentUsername, type: 'JOIN' }));
            loadPublicHistory();
            loadConversations();
            loadUsers();
        }

        function onError() {
            document.getElementById('chatStatus').textContent = 'Terputus...';
            setTimeout(connect, 3000);
        }

        // ==================== API Helpers ====================
        async function apiGet(url) {
            const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
            if (res.status === 401) { logout(); return null; }
            return res.ok ? await res.json() : null;
        }
        async function apiPost(url, body) {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: body ? JSON.stringify(body) : undefined
            });
            if (res.status === 401) { logout(); return null; }
            return res.ok ? await res.json() : null;
        }

        // ==================== Load Data ====================
        async function loadPublicHistory() {
            const msgs = await apiGet('/api/messages');
            if (msgs && currentView === 'public') {
                msgs.forEach(m => renderMessage(m, false));
                scrollToBottom();
            }
        }

        async function loadConversations() {
            const data = await apiGet('/api/chat/conversations');
            if (!data) return;
            const list = document.getElementById('conversationList');
            const pub = document.getElementById('publicChatItem');
            list.innerHTML = '';
            list.appendChild(pub);
            data.forEach(conv => appendConvItem(conv));
        }

        async function loadUsers() {
            const data = await apiGet('/api/chat/users');
            if (!data) return;
            const list = document.getElementById('usersList');
            list.innerHTML = '';
            data.forEach(u => {
                const item = document.createElement('div');
                item.className = 'chat-list-item';
                item.setAttribute('data-username', u.username);
                item.onclick = () => startPrivateChat(u.username);
                const avatarHtml = u.profilePhoto
                    ? '<div class="avatar"><img class="avatar-img" src="' + esc(u.profilePhoto) + '"></div>'
                    : '<div class="avatar" style="background:' + esc(u.avatarColor) + ';">' + esc(u.username.charAt(0).toUpperCase()) + '</div>';
                item.innerHTML = avatarHtml +
                    '<div class="chat-list-info">' +
                        '<div class="chat-list-name">' + esc(u.displayName) + '</div>' +
                        '<div class="chat-list-preview" style="color:var(--wa-text-secondary);">' +
                            (u.online ? '<span class="online-badge"><span class="online-dot"></span> Online</span>'
                                      : (u.bio ? esc(u.bio) : '@' + esc(u.username))) +
                        '</div>' +
                    '</div>';
                list.appendChild(item);
            });
        }

        // ==================== Sidebar ====================
        function switchTab(tab) {
            document.getElementById('tabChats').style.color = tab==='chats' ? 'var(--wa-green)' : 'var(--wa-text-secondary)';
            document.getElementById('tabChats').style.borderBottomColor = tab==='chats' ? 'var(--wa-green)' : 'transparent';
            document.getElementById('tabUsers').style.color = tab==='users' ? 'var(--wa-green)' : 'var(--wa-text-secondary)';
            document.getElementById('tabUsers').style.borderBottomColor = tab==='users' ? 'var(--wa-green)' : 'transparent';
            document.getElementById('conversationList').style.display = tab==='chats' ? 'block' : 'none';
            document.getElementById('usersList').style.display = tab==='users' ? 'block' : 'none';
        }
        function showNewChat() { switchTab('users'); }

        function filterSidebar() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.chat-list-item').forEach(i => {
                const n = i.querySelector('.chat-list-name');
                if (n) i.style.display = n.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        }

        function appendConvItem(conv) {
            const list = document.getElementById('conversationList');
            const existing = document.querySelector('[data-room-id="' + conv.roomId + '"]');
            if (existing) {
                existing.querySelector('.chat-list-preview').textContent = conv.lastMessage || 'Mulai chat...';
                if (existing.querySelector('.chat-list-time')) existing.querySelector('.chat-list-time').textContent = conv.lastTime || '';
                return;
            }
            const item = document.createElement('div');
            item.className = 'chat-list-item';
            item.setAttribute('data-room-id', conv.roomId);
            item.onclick = () => openPrivateChat(conv.roomId, conv.username, conv.displayName, conv.avatarColor, conv.profilePhoto);
            const avatarHtml = conv.profilePhoto
                ? '<div class="avatar"><img class="avatar-img" src="' + esc(conv.profilePhoto) + '"></div>'
                : '<div class="avatar" style="background:' + esc(conv.avatarColor) + ';">' + esc(conv.username.charAt(0).toUpperCase()) + '</div>';
            item.innerHTML = avatarHtml +
                '<div class="chat-list-info">' +
                    '<div class="chat-list-name">' + esc(conv.displayName) + '</div>' +
                    '<div class="chat-list-preview">' + esc(conv.lastMessage || 'Mulai chat...') + '</div>' +
                '</div>' +
                '<div class="chat-list-time">' + esc(conv.lastTime || '') + '</div>';
            list.appendChild(item);
        }

        function setActiveItem(sel) {
            document.querySelectorAll('.chat-list-item').forEach(i => i.classList.remove('active'));
            const el = document.querySelector(sel);
            if (el) el.classList.add('active');
        }

        // ==================== Open Chats ====================
        function openPublicChat() {
            currentView = 'public'; currentRoomId = null; currentRecipient = null;
            document.getElementById('chatName').textContent = 'Public Chat Room';
            const av = document.getElementById('chatAvatar');
            av.style.background = 'linear-gradient(135deg,#00A884,#00D4AA)';
            av.innerHTML = '💬';
            document.getElementById('chatStatus').textContent = onlineUsers.size + ' peserta online';
            setActiveItem('#publicChatItem');
            clearMessages();
            loadPublicHistory();
            switchTab('chats');
        }

        async function startPrivateChat(username) {
            const data = await apiPost('/api/chat/room/' + username);
            if (data) {
                openPrivateChat(data.roomId, data.targetUsername, data.targetDisplayName, data.targetAvatarColor, data.targetProfilePhoto);
                loadConversations();
                switchTab('chats');
            }
        }

        async function openPrivateChat(roomId, username, displayName, avatarColor, profilePhoto) {
            currentView = 'private'; currentRoomId = roomId; currentRecipient = username;
            document.getElementById('chatName').textContent = displayName || username;
            const av = document.getElementById('chatAvatar');
            renderAvatar(av, avatarColor, username, profilePhoto);
            document.getElementById('chatStatus').textContent = onlineUsers.has(username) ? 'Online' : 'Offline';
            setActiveItem('[data-room-id="' + roomId + '"]');
            clearMessages();

            const msgs = await apiGet('/api/chat/room/' + roomId + '/messages');
            if (msgs) {
                msgs.forEach(m => renderMessage(m, false));
                scrollToBottom();
            }

            // Mark messages as read
            if (stompClient && stompClient.connected) {
                stompClient.send('/app/chat.markRead', {}, JSON.stringify({ roomId: roomId }));
            }
        }

        function clearMessages() {
            document.getElementById('messageArea').innerHTML = '<div class="date-divider">Hari Ini</div>';
        }

        // ==================== Send ====================
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content || !stompClient || !stompClient.connected) return;

            if (currentView === 'public') {
                stompClient.send('/app/chat.sendMessage', {}, JSON.stringify({ sender: currentUsername, content, type: 'CHAT' }));
            } else if (currentView === 'private' && currentRecipient) {
                stompClient.send('/app/chat.sendPrivate', {}, JSON.stringify({ sender: currentUsername, recipient: currentRecipient, content, type: 'CHAT' }));
            }
            input.value = '';
            input.focus();
        }

        // ==================== Receive ====================
        function onPublicMessage(payload) {
            const msg = JSON.parse(payload.body);
            if (msg.type === 'JOIN') {
                if (currentView === 'public') renderSystemMessage(msg.sender + ' bergabung 🎉');
                addOnlineUser(msg.sender, msg.avatarColor, msg.profilePhoto);
                updateOnlineCount();
            } else if (msg.type === 'LEAVE') {
                if (currentView === 'public') renderSystemMessage(msg.sender + ' keluar');
                removeOnlineUser(msg.sender);
                updateOnlineCount();
            } else {
                if (currentView === 'public') renderMessage(msg, true);
                document.getElementById('publicLastMsg').textContent = msg.sender + ': ' + msg.content;
                document.getElementById('publicLastTime').textContent = msg.timestamp;
            }
        }

        function onPrivateMessage(payload) {
            const msg = JSON.parse(payload.body);

            // Read receipt notification
            if (msg.sender === '_system_read_' && msg.status === 'READ') {
                // Update all messages in this room to show blue ticks
                if (currentView === 'private' && msg.roomId === currentRoomId) {
                    document.querySelectorAll('.message-row.self .message-status').forEach(el => {
                        el.className = 'message-status read';
                        el.textContent = '✓✓';
                    });
                }
                return;
            }

            if (currentView === 'private' && msg.roomId === currentRoomId) {
                renderMessage(msg, true);
                // If we received a message (not sent by us), mark as read
                if (msg.sender !== currentUsername && stompClient && stompClient.connected) {
                    stompClient.send('/app/chat.markRead', {}, JSON.stringify({ roomId: currentRoomId }));
                }
            }

            // Update sidebar
            const convItem = document.querySelector('[data-room-id="' + msg.roomId + '"]');
            if (convItem) {
                convItem.querySelector('.chat-list-preview').textContent =
                    (msg.sender === currentUsername ? 'Anda: ' : '') + msg.content;
                const timeEl = convItem.querySelector('.chat-list-time');
                if (timeEl) timeEl.textContent = msg.timestamp;
            } else {
                loadConversations();
            }
        }

        // ==================== Render ====================
        /**
         * Read receipt logic:
         *   ✓  (gray)  = SENT — recipient offline
         *   ✓✓ (gray)  = DELIVERED — recipient online, not read
         *   ✓✓ (blue)  = READ — recipient opened conversation
         */
        function renderMessage(msg, animate) {
            const area = document.getElementById('messageArea');
            const isSelf = msg.sender === currentUsername;

            const row = document.createElement('div');
            row.className = 'message-row ' + (isSelf ? 'self' : 'other');
            if (!animate) row.style.animation = 'none';

            const avatarColor = msg.avatarColor || '#00A884';
            const initial = msg.sender ? msg.sender.charAt(0).toUpperCase() : '?';
            const photo = msg.profilePhoto || '';

            // Build status checkmarks
            let statusHTML = '';
            if (isSelf) {
                let checkIcon, statusClass;
                const st = (msg.status || 'DELIVERED').toUpperCase();
                if (st === 'READ') {
                    checkIcon = '✓✓'; statusClass = 'read';       // ✓✓ blue
                } else if (st === 'DELIVERED') {
                    checkIcon = '✓✓'; statusClass = '';            // ✓✓ gray
                } else {
                    checkIcon = '✓'; statusClass = '';             // ✓ gray
                }
                statusHTML = '<span class="message-status ' + statusClass + '">' + checkIcon + '</span>';
            }

            // Avatar HTML
            const avatarHTML = isSelf ? '' :
                (photo
                    ? '<div class="avatar avatar-sm" style="margin-bottom:4px;overflow:hidden;"><img class="avatar-img" src="' + esc(photo) + '"></div>'
                    : '<div class="avatar avatar-sm" style="background:' + esc(avatarColor) + ';margin-bottom:4px;">' + esc(initial) + '</div>');

            row.innerHTML = avatarHTML +
                '<div class="message-bubble">' +
                    (isSelf ? '' : '<div class="message-sender" style="color:' + esc(avatarColor) + ';">' + esc(msg.sender) + '</div>') +
                    '<div class="message-text">' + esc(msg.content) + '</div>' +
                    '<div class="message-meta">' +
                        '<span class="message-time">' + esc(msg.timestamp || '') + '</span>' +
                        statusHTML +
                    '</div>' +
                '</div>';

            area.appendChild(row);
            scrollToBottom();
        }

        function renderSystemMessage(text) {
            const area = document.getElementById('messageArea');
            const div = document.createElement('div');
            div.className = 'system-message';
            div.textContent = text;
            area.appendChild(div);
            scrollToBottom();
        }

        // ==================== Online ====================
        function addOnlineUser(username, color, photo) {
            onlineUsers.set(username, { avatarColor: color || '#00A884', profilePhoto: photo || '' });
        }
        function removeOnlineUser(username) { onlineUsers.delete(username); }
        function updateOnlineCount() {
            if (currentView === 'public') {
                document.getElementById('chatStatus').textContent = onlineUsers.size + ' peserta online';
            }
        }

        // ==================== Utils ====================
        function scrollToBottom() {
            const a = document.getElementById('messageArea');
            setTimeout(() => { a.scrollTop = a.scrollHeight; }, 50);
        }
        function esc(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function logout() {
            localStorage.clear();
            if (stompClient) try { stompClient.disconnect(); } catch(e) {}
            window.location.href = '/login.html';
        }
        window.addEventListener('beforeunload', () => {
            if (stompClient && stompClient.connected) {
                stompClient.send('/app/chat.addUser', {}, JSON.stringify({ sender: currentUsername, type: 'LEAVE' }));
            }
        });

        connect();
    </script>
</body>
</html>
