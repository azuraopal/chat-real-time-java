<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — ChatApp</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">✨</div>
                <h1>Buat Akun</h1>
                <p>Daftar untuk mulai chat bersama teman</p>
            </div>

            <div class="auth-error" id="errorMsg"></div>
            <div class="auth-success" id="successMsg"></div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" class="form-input" id="username" placeholder="Pilih username" required autocomplete="username" minlength="3" maxlength="50">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Buat password" required autocomplete="new-password" minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Konfirmasi Password</label>
                    <input type="password" class="form-input" id="confirmPassword" placeholder="Ulangi password" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary" id="registerBtn">
                    Daftar
                </button>
            </form>

            <div class="auth-footer">
                Sudah punya akun? <a href="/login.html">Masuk disini</a>
            </div>
        </div>
    </div>

    <script>
        // Redirect to chat if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/chat.html';
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>';
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                errorDiv.textContent = 'Password tidak cocok!';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Daftar';
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = 'Password minimal 6 karakter!';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Daftar';
                return;
            }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    successDiv.textContent = 'Registrasi berhasil! Mengalihkan ke halaman login...';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 1500);
                } else {
                    errorDiv.textContent = data.message || 'Registrasi gagal!';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Gagal terhubung ke server. Coba lagi.';
                errorDiv.style.display = 'block';
            }

            btn.disabled = false;
            btn.innerHTML = 'Daftar';
        }
    </script>
</body>
</html>
