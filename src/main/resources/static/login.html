<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ChatApp</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">💬</div>
                <h1>ChatApp</h1>
                <p>Masuk ke akun untuk mulai chat</p>
            </div>

            <div class="auth-error" id="errorMsg"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" class="form-input" id="username" placeholder="Masukkan username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Masukkan password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    Masuk
                </button>
            </form>

            <div class="auth-footer">
                Belum punya akun? <a href="/register.html">Daftar disini</a>
            </div>
        </div>
    </div>

    <script>
        // Redirect to chat if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/chat.html';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMsg');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>';
            errorDiv.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userId', data.id);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('displayName', data.displayName || data.username);
                    localStorage.setItem('avatarColor', data.avatarColor || '#00A884');
                    window.location.href = '/chat.html';
                } else {
                    errorDiv.textContent = data.message || 'Username atau password salah!';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Gagal terhubung ke server. Coba lagi.';
                errorDiv.style.display = 'block';
            }

            btn.disabled = false;
            btn.innerHTML = 'Masuk';
        }
    </script>
</body>
</html>
