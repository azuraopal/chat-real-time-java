spring.application.name=chat-real-time-java

# ========================
# MySQL Laragon Configuration
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/chat_app?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# JWT Configuration (Phase 2)
# ========================
app.jwt.secret=ChatAppSecretKeyYangSangatPanjangDanAmanUntukJWTToken2024ChatRealTime
app.jwt.expiration-ms=86400000
